<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼儿园日常记录系统</title>
    <meta name="description" content="幼儿园孩子日常记录与学期报告系统">
    <meta name="theme-color" content="#4A90D9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="幼儿园记录">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4A90D9;
            --primary-light: #E8F0FE;
            --secondary: #FF6B6B;
            --success: #51CF66;
            --warning: #FFD43B;
            --info: #66D9E8;
            --bg: #F0F2F5;
            --card: #FFFFFF;
            --text: #2C3E50;
            --text-light: #8492A6;
            --border: #E4E7ED;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* === NAV === */
        .navbar {
            background: var(--card);
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            padding: 16px 0;
            margin-right: 12px;
            white-space: nowrap;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
        }
        .nav-tab {
            padding: 14px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
            border: none;
            background: none;
            border-bottom: 3px solid transparent;
            transition: all .2s;
            white-space: nowrap;
        }
        .nav-tab:hover { color: var(--primary); }
        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .nav-actions { display: flex; gap: 8px; margin-left: auto; }

        /* === COMMON === */
        .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
        .view { display: none; }
        .view.active { display: block; }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #3A7BC8; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #40C057; }
        .btn-danger { background: var(--secondary); color: #fff; }
        .btn-danger:hover { background: #E85D5D; }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-outline:hover { background: var(--primary-light); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-icon {
            width: 32px; height: 32px;
            padding: 0; border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            background: transparent; border: 1px solid var(--border); cursor: pointer;
            font-size: 14px; transition: all .2s;
        }
        .btn-icon:hover { background: var(--primary-light); border-color: var(--primary); }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color .2s;
            font-family: inherit;
            background: #fff;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74,144,217,0.1);
        }
        textarea.form-input { resize: vertical; min-height: 60px; }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        .toolbar .form-input, .toolbar .form-select {
            width: auto;
            min-width: 160px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        /* === RATING BUTTONS === */
        .rating-group {
            display: flex;
            gap: 6px;
        }
        .rating-btn {
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
        }
        .rating-btn:hover { border-color: var(--primary); transform: scale(1.1); }
        .rating-btn.active {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: scale(1.1);
        }

        /* === ATTENDANCE BUTTONS === */
        .att-group { display: flex; gap: 8px; }
        .att-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all .2s;
        }
        .att-btn:hover { border-color: var(--primary); }
        .att-btn.active[data-val="present"] { border-color: var(--success); background: #EBFBEE; color: #2B8A3E; }
        .att-btn.active[data-val="absent"] { border-color: var(--secondary); background: #FFF0F0; color: #C92A2A; }
        .att-btn.active[data-val="late"] { border-color: var(--warning); background: #FFF9DB; color: #E67700; }

        /* === STUDENT CARDS === */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .student-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            text-align: center;
            transition: transform .2s;
            position: relative;
        }
        .student-card:hover { transform: translateY(-2px); }
        .student-avatar { font-size: 48px; margin-bottom: 8px; }
        .student-name { font-size: 16px; font-weight: 600; }
        .student-class {
            font-size: 12px;
            color: var(--text-light);
            background: var(--primary-light);
            padding: 2px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 4px;
        }
        .student-actions {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        /* === EMOJI PICKER === */
        .emoji-picker {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            padding: 8px;
            background: #F8F9FA;
            border-radius: 8px;
        }
        .emoji-option {
            width: 36px; height: 36px;
            border: 2px solid transparent;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }
        .emoji-option:hover { transform: scale(1.15); }
        .emoji-option.active { border-color: var(--primary); background: var(--primary-light); }

        /* === MODAL === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* === TABLE === */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th, .data-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th {
            font-weight: 600;
            color: var(--text-light);
            font-size: 12px;
            text-transform: uppercase;
            background: #F8F9FA;
            position: sticky;
            top: 0;
        }
        .data-table tr:hover td { background: #F8F9FA; }
        .table-wrap { overflow-x: auto; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-present { background: #EBFBEE; color: #2B8A3E; }
        .badge-absent { background: #FFF0F0; color: #C92A2A; }
        .badge-late { background: #FFF9DB; color: #E67700; }

        /* === BATCH INPUT === */
        .batch-row {
            display: grid;
            grid-template-columns: 60px 100px repeat(5, 1fr) auto;
            gap: 8px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .batch-row.header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 2px solid var(--border);
        }
        .batch-avatar { font-size: 28px; text-align: center; }
        .batch-name { font-weight: 500; font-size: 13px; }
        .batch-cell .form-input, .batch-cell .form-select {
            padding: 6px 8px;
            font-size: 12px;
        }
        .mini-rating { display: flex; gap: 2px; }
        .mini-rating-btn {
            width: 26px; height: 26px;
            border-radius: 6px;
            border: 1.5px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }
        .mini-rating-btn:hover { border-color: var(--primary); }
        .mini-rating-btn.active { border-color: var(--primary); background: var(--primary-light); }

        /* === CHARTS === */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .chart-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
        }
        .chart-card h3 {
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text);
        }
        .chart-card canvas { max-height: 300px; }
        .chart-card.full-width { grid-column: 1 / -1; }
        .stat-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px 24px;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }
        .stat-present .stat-value { color: var(--success); }
        .stat-absent .stat-value { color: var(--secondary); }
        .stat-late .stat-value { color: #E67700; }

        /* === PAGINATION === */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
        }
        .page-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* === PRINT === */
        @media print {
            .navbar, .toolbar, .btn, .nav-actions { display: none !important; }
            .view { display: block !important; }
            .card { box-shadow: none; border: 1px solid #ddd; }
            body { background: #fff; }
        }
        @media (max-width: 768px) {
            .nav-brand { font-size: 14px; }
            .nav-tab { padding: 12px 10px; font-size: 12px; }
            .batch-row { grid-template-columns: 40px 70px repeat(5, 1fr) auto; gap: 4px; font-size: 11px; }
            .chart-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<div class="navbar">
    <div class="nav-inner">
        <div class="nav-brand">🌈 幼儿园日常记录</div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-view="students" onclick="switchView('students')">👦 学生管理</button>
            <button class="nav-tab" data-view="daily" onclick="switchView('daily')">📝 每日录入</button>
            <button class="nav-tab" data-view="browse" onclick="switchView('browse')">📊 数据浏览</button>
            <button class="nav-tab" data-view="report" onclick="switchView('report')">📈 学期报告</button>
        </div>
        <div class="nav-actions">
            <button class="btn btn-outline btn-sm" onclick="exportJSON()">💾 备份</button>
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📂 恢复</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
        </div>
    </div>
</div>

<!-- View: Students -->
<div class="container">
    <div id="view-students" class="view active">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="showStudentModal()">+ 添加学生</button>
            <select class="form-select" id="studentClassFilter" onchange="renderStudents()">
                <option value="">全部班级</option>
            </select>
            <span id="studentCount" style="margin-left:auto;font-size:13px;color:var(--text-light)"></span>
        </div>
        <div id="studentGrid" class="student-grid"></div>
    </div>

    <!-- View: Daily Input -->
    <div id="view-daily" class="view">
        <div class="toolbar">
            <div>
                <label class="form-label">日期</label>
                <input type="date" class="form-input" id="dailyDate">
            </div>
            <div>
                <label class="form-label">班级</label>
                <select class="form-select" id="dailyClass" onchange="renderDailyInput()">
                    <option value="">选择班级</option>
                </select>
            </div>
            <div>
                <label class="form-label">模式</label>
                <select class="form-select" id="dailyMode" onchange="renderDailyInput()">
                    <option value="batch">批量录入</option>
                    <option value="single">单个录入</option>
                </select>
            </div>
            <div id="singleStudentWrap" style="display:none">
                <label class="form-label">学生</label>
                <select class="form-select" id="dailyStudent" onchange="renderSingleInput()"></select>
            </div>
        </div>
        <div id="dailyContent"></div>
    </div>

    <!-- View: Data Browse -->
    <div id="view-browse" class="view">
        <div class="toolbar">
            <div>
                <label class="form-label">班级</label>
                <select class="form-select" id="browseClass" onchange="updateBrowseStudents();filterRecords()">
                    <option value="">全部</option>
                </select>
            </div>
            <div>
                <label class="form-label">学生</label>
                <select class="form-select" id="browseStudent" onchange="filterRecords()">
                    <option value="">全部</option>
                </select>
            </div>
            <div>
                <label class="form-label">开始日期</label>
                <input type="date" class="form-input" id="browseStart" onchange="filterRecords()">
            </div>
            <div>
                <label class="form-label">结束日期</label>
                <input type="date" class="form-input" id="browseEnd" onchange="filterRecords()">
            </div>
            <button class="btn btn-success" style="align-self:flex-end" onclick="exportExcel()">📥 导出 Excel</button>
        </div>
        <div class="card">
            <div class="table-wrap">
                <table class="data-table" id="browseTable">
                    <thead>
                        <tr>
                            <th>日期</th><th>学生</th><th>班级</th><th>出勤</th>
                            <th>情绪</th><th>用餐</th><th>午睡(分钟)</th><th>午睡质量</th>
                            <th>体温</th><th>健康备注</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="browseBody"></tbody>
                </table>
            </div>
            <div id="browsePagination" class="pagination"></div>
        </div>
    </div>

    <!-- View: Report -->
    <div id="view-report" class="view">
        <div class="toolbar">
            <div>
                <label class="form-label">学生</label>
                <select class="form-select" id="reportStudent">
                    <option value="">选择学生</option>
                </select>
            </div>
            <div>
                <label class="form-label">时间范围</label>
                <select class="form-select" id="reportPreset" onchange="applyPreset()">
                    <option value="month">本月</option>
                    <option value="semester" selected>本学期</option>
                    <option value="custom">自定义</option>
                </select>
            </div>
            <div id="reportCustomRange" style="display:none">
                <label class="form-label">自定义范围</label>
                <div style="display:flex;gap:8px">
                    <input type="date" class="form-input" id="reportStart">
                    <input type="date" class="form-input" id="reportEnd">
                </div>
            </div>
            <button class="btn btn-primary" style="align-self:flex-end" onclick="generateReport()">生成报告</button>
            <button class="btn btn-outline" style="align-self:flex-end" onclick="window.print()">🖨 打印</button>
        </div>
        <div id="reportContent"></div>
    </div>
</div>

<!-- Student Modal -->
<div class="modal-overlay" id="studentModal">
    <div class="modal">
        <div class="modal-title" id="studentModalTitle">添加学生</div>
        <input type="hidden" id="editStudentId">
        <div class="form-group">
            <label class="form-label">姓名</label>
            <input type="text" class="form-input" id="studentName" placeholder="请输入学生姓名">
        </div>
        <div class="form-group">
            <label class="form-label">班级</label>
            <input type="text" class="form-input" id="studentClassName" placeholder="如：大一班、中二班" list="classList">
            <datalist id="classList"></datalist>
        </div>
        <div class="form-group">
            <label class="form-label">选择头像</label>
            <div class="emoji-picker" id="emojiPicker"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('studentModal')">取消</button>
            <button class="btn btn-primary" onclick="saveStudent()">保存</button>
        </div>
    </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal" style="max-width:380px;text-align:center">
        <p id="confirmMsg" style="font-size:15px;margin-bottom:20px"></p>
        <div class="modal-footer" style="justify-content:center">
            <button class="btn btn-outline" onclick="closeModal('confirmModal')">取消</button>
            <button class="btn btn-danger" id="confirmOk">确认删除</button>
        </div>
    </div>
</div>

<script>
/* ===== DATA LAYER ===== */
const EMOJIS = ['👦','👧','🧒','👶','🐻','🐰','🐱','🐶','🦊','🐼','🐨','🐯','🦁','🐸','🐵','🦄','🌟','🌈','🎨','🎵','🍎','🌻','🐝','🦋'];
const MOOD_LABELS = ['😢','😟','😐','🙂','😄'];
const MEAL_LABELS = ['1','2','3','4','5'];
const NAP_Q_LABELS = ['1','2','3','4','5'];
const ATT_MAP = { present: '出勤', absent: '请假', late: '迟到' };
let chartInstances = [];

function getStudents() {
    return JSON.parse(localStorage.getItem('kg_students') || '[]');
}
function saveStudents(list) {
    localStorage.setItem('kg_students', JSON.stringify(list));
}
function getRecords() {
    return JSON.parse(localStorage.getItem('kg_records') || '[]');
}
function saveRecords(list) {
    localStorage.setItem('kg_records', JSON.stringify(list));
}
function getClasses() {
    const students = getStudents();
    return [...new Set(students.map(s => s.className).filter(Boolean))].sort();
}
function studentById(id) {
    return getStudents().find(s => s.id === id);
}

/* ===== NAVIGATION ===== */
function switchView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + viewId).classList.add('active');
    document.querySelector(`.nav-tab[data-view="${viewId}"]`).classList.add('active');
    if (viewId === 'daily') initDailyView();
    if (viewId === 'browse') initBrowseView();
    if (viewId === 'report') initReportView();
}

/* ===== POPULATE CLASS DROPDOWNS ===== */
function refreshClassDropdowns() {
    const classes = getClasses();
    const selectors = ['studentClassFilter','dailyClass','browseClass'];
    selectors.forEach(id => {
        const sel = document.getElementById(id);
        const val = sel.value;
        const firstOpt = sel.options[0].outerHTML;
        sel.innerHTML = firstOpt + classes.map(c => `<option value="${c}">${c}</option>`).join('');
        sel.value = val;
    });
    const dl = document.getElementById('classList');
    dl.innerHTML = classes.map(c => `<option value="${c}">`).join('');
}

/* ===== STUDENT MANAGEMENT ===== */
function renderStudents() {
    const filter = document.getElementById('studentClassFilter').value;
    let students = getStudents();
    if (filter) students = students.filter(s => s.className === filter);
    const grid = document.getElementById('studentGrid');
    if (!students.length) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">👦</div><p>还没有学生，点击上方按钮添加</p></div>';
    } else {
        grid.innerHTML = students.map(s => `
            <div class="student-card">
                <div class="student-avatar">${s.avatar}</div>
                <div class="student-name">${esc(s.name)}</div>
                <div class="student-class">${esc(s.className)}</div>
                <div class="student-actions">
                    <button class="btn-icon" onclick="showStudentModal('${s.id}')" title="编辑">✏️</button>
                    <button class="btn-icon" onclick="confirmDeleteStudent('${s.id}')" title="删除">🗑️</button>
                </div>
            </div>
        `).join('');
    }

function showStudentModal(editId) {
    const modal = document.getElementById('studentModal');
    document.getElementById('studentModalTitle').textContent = editId ? '编辑学生' : '添加学生';
    document.getElementById('editStudentId').value = editId || '';
    const picker = document.getElementById('emojiPicker');
    let selectedEmoji = EMOJIS[0];
    if (editId) {
        const s = studentById(editId);
        document.getElementById('studentName').value = s.name;
        document.getElementById('studentClassName').value = s.className;
        selectedEmoji = s.avatar;
    } else {
        document.getElementById('studentName').value = '';
        document.getElementById('studentClassName').value = '';
    }
    picker.innerHTML = EMOJIS.map(e => `<div class="emoji-option${e===selectedEmoji?' active':''}" onclick="pickEmoji(this,'${e}')">${e}</div>`).join('');
    modal.classList.add('open');
}

function pickEmoji(el, emoji) {
    el.parentElement.querySelectorAll('.emoji-option').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
}

function saveStudent() {
    const name = document.getElementById('studentName').value.trim();
    const className = document.getElementById('studentClassName').value.trim();
    const activeEmoji = document.querySelector('#emojiPicker .emoji-option.active');
    const avatar = activeEmoji ? activeEmoji.textContent : EMOJIS[0];
    if (!name) return alert('请输入学生姓名');
    if (!className) return alert('请输入班级');
    const editId = document.getElementById('editStudentId').value;
    const students = getStudents();
    if (editId) {
        const idx = students.findIndex(s => s.id === editId);
        if (idx > -1) { students[idx].name = name; students[idx].className = className; students[idx].avatar = avatar; }
    } else {
        students.push({ id: 's_' + Date.now(), name, className, avatar });
    }
    saveStudents(students);
    closeModal('studentModal');
    renderStudents();
    refreshClassDropdowns();
}

function confirmDeleteStudent(id) {
    const s = studentById(id);
    document.getElementById('confirmMsg').textContent = `确定要删除学生「${s.name}」吗？该学生的所有记录也将被删除。`;
    document.getElementById('confirmOk').onclick = () => {
        let students = getStudents().filter(x => x.id !== id);
        saveStudents(students);
        let records = getRecords().filter(r => r.studentId !== id);
        saveRecords(records);
        closeModal('confirmModal');
        renderStudents();
        refreshClassDropdowns();
    };
    document.getElementById('confirmModal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toggleRating(btn) {

function toggleMini(btn) {

function getActiveVal(containerId) {
    const el = document.querySelector('#' + containerId + ' .active');
    return el ? parseInt(el.dataset.val) : null;
}
function getActiveAttVal(containerId) {
    const el = document.querySelector('#' + containerId + ' .att-btn.active');
    return el ? el.dataset.val : 'present';
}

function saveSingleRecord(studentId) {
    const date = document.getElementById('dailyDate').value;
    if (!date) return alert('请选择日期');
    const record = {
        studentId,
        date,
        attendance: getActiveAttVal('singleAtt'),
        mood: getActiveVal('singleMood') || 3,
        meal: getActiveVal('singleMeal') || 3,
        napDuration: parseInt(document.getElementById('singleNapDur').value) || 0,
        napQuality: getActiveVal('singleNapQ') || 3,
        temperature: parseFloat(document.getElementById('singleTemp').value) || 36.5,
        healthNote: document.getElementById('singleHealthNote').value.trim(),
        remark: document.getElementById('singleRemark').value.trim()
    };
    const records = getRecords();
    const idx = records.findIndex(r => r.studentId === studentId && r.date === date);
    if (idx > -1) {
        record.id = records[idx].id;
        records[idx] = record;
    } else {
        record.id = 'r_' + Date.now();
        records.push(record);
    }
    saveRecords(records);
    alert('保存成功！');
    renderSingleInput();
}

function saveBatchRecords() {
    const date = document.getElementById('dailyDate').value;
    if (!date) return alert('请选择日期');
    const rows = document.querySelectorAll('.batch-row[data-sid]');
    const records = getRecords();
    let count = 0;
    rows.forEach(row => {
        const sid = row.dataset.sid;
        const moodBtn = row.querySelector('.batch-mood .mini-rating-btn.active');
        const mealBtn = row.querySelector('.batch-meal .mini-rating-btn.active');
        const record = {
            studentId: sid,
            date,
            attendance: row.querySelector('.batch-att').value,
            mood: moodBtn ? parseInt(moodBtn.dataset.val) : 3,
            meal: mealBtn ? parseInt(mealBtn.dataset.val) : 3,
            napDuration: parseInt(row.querySelector('.batch-nap').value) || 0,
            napQuality: 3,
            temperature: parseFloat(row.querySelector('.batch-temp').value) || 36.5,
            healthNote: '',
            remark: ''
        };
        const idx = records.findIndex(r => r.studentId === sid && r.date === date);
        if (idx > -1) { record.id = records[idx].id; records[idx] = record; }
        else { record.id = 'r_' + Date.now() + '_' + count; records.push(record); }
        count++;
    });
    saveRecords(records);
    alert(`已保存 ${count} 条记录！`);
    renderBatchInput();
}

/* ===== DATA BROWSE ===== */
let browseCurrentPage = 1;
const PAGE_SIZE = 15;

function initBrowseView() {
    refreshClassDropdowns();
    updateBrowseStudents();
    filterRecords();
}

function updateBrowseStudents() {
    const cls = document.getElementById('browseClass').value;
    let students = getStudents();
    if (cls) students = students.filter(s => s.className === cls);
    const sel = document.getElementById('browseStudent');
    sel.innerHTML = '<option value="">全部</option>' + students.map(s => `<option value="${s.id}">${s.avatar} ${s.name}</option>`).join('');
}

function filterRecords() {
    browseCurrentPage = 1;
    renderBrowseTable();
}

function getFilteredRecords() {
    const cls = document.getElementById('browseClass').value;
    const sid = document.getElementById('browseStudent').value;
    const start = document.getElementById('browseStart').value;
    const end = document.getElementById('browseEnd').value;
    let records = getRecords();
    if (sid) records = records.filter(r => r.studentId === sid);
    else if (cls) {
        const sids = getStudents().filter(s => s.className === cls).map(s => s.id);
        records = records.filter(r => sids.includes(r.studentId));
    }
    if (start) records = records.filter(r => r.date >= start);
    if (end) records = records.filter(r => r.date <= end);
    records.sort((a, b) => b.date.localeCompare(a.date));
    return records;
}

function renderBrowseTable() {
    const records = getFilteredRecords();
    const totalPages = Math.max(1, Math.ceil(records.length / PAGE_SIZE));
    if (browseCurrentPage > totalPages) browseCurrentPage = totalPages;
    const start = (browseCurrentPage - 1) * PAGE_SIZE;
    const pageRecords = records.slice(start, start + PAGE_SIZE);
    const tbody = document.getElementById('browseBody');
    if (!records.length) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--text-light);padding:40px">暂无数据</td></tr>';
    } else {
        tbody.innerHTML = pageRecords.map(r => {
            const s = studentById(r.studentId);
            const name = s ? `${s.avatar} ${esc(s.name)}` : '(已删除)';
            const cls = s ? esc(s.className) : '-';
            return `<tr>
                <td>${r.date}</td>
                <td>${name}</td>
                <td>${cls}</td>
                <td><span class="badge badge-${r.attendance}">${ATT_MAP[r.attendance]||r.attendance}</span></td>
                <td>${MOOD_LABELS[(r.mood||3)-1]}</td>
                <td>${'⭐'.repeat(r.meal||3)}</td>
                <td>${r.napDuration}分钟</td>
                <td>${'💤'.repeat(r.napQuality||3)}</td>
                <td>${r.temperature}°C</td>
                <td>${esc(r.healthNote||'')}</td>
                <td><button class="btn-icon" onclick="deleteRecord('${r.id}')" title="删除">🗑️</button></td>
            </tr>`;
        }).join('');
    }
    const pag = document.getElementById('browsePagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let ph = '';
    if (browseCurrentPage > 1) ph += `<button class="page-btn" onclick="browseCurrentPage--;renderBrowseTable()">◀</button>`;
    for (let i = 1; i <= totalPages; i++) {
        if (totalPages > 7 && Math.abs(i - browseCurrentPage) > 2 && i !== 1 && i !== totalPages) {
            if (i === 2 || i === totalPages - 1) ph += '<span style="padding:0 4px">...</span>';
            continue;
        }
        ph += `<button class="page-btn${i===browseCurrentPage?' active':''}" onclick="browseCurrentPage=${i};renderBrowseTable()">${i}</button>`;
    }
    if (browseCurrentPage < totalPages) ph += `<button class="page-btn" onclick="browseCurrentPage++;renderBrowseTable()">▶</button>`;
    pag.innerHTML = ph;
}

function deleteRecord(id) {
    if (!confirm('确定删除这条记录吗？')) return;
    const records = getRecords().filter(r => r.id !== id);
    saveRecords(records);
    renderBrowseTable();
}

/* ===== EXCEL EXPORT ===== */
function exportExcel() {
    const records = getFilteredRecords();
    if (!records.length) return alert('没有数据可导出');
    const data = records.map(r => {
        const s = studentById(r.studentId);
        return {
            '日期': r.date,
            '学生': s ? s.name : '(已删除)',
            '班级': s ? s.className : '-',
            '出勤': ATT_MAP[r.attendance] || r.attendance,

            '用餐(1-5)': r.meal,
            '午睡时长(分钟)': r.napDuration,
            '午睡质量(1-5)': r.napQuality,
            '体温(°C)': r.temperature,
            '健康备注': r.healthNote || '',
            '其他备注': r.remark || ''
        };
    });
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();

/* ===== SEMESTER REPORT ===== */
function initReportView() {
    const sel = document.getElementById('reportStudent');
    const students = getStudents();
    sel.innerHTML = '<option value="">选择学生</option>' + students.map(s =>
        `<option value="${s.id}">${s.avatar} ${s.name} (${s.className})</option>`
    ).join('');
    applyPreset();
}

function applyPreset() {
    const preset = document.getElementById('reportPreset').value;
    const customWrap = document.getElementById('reportCustomRange');
    customWrap.style.display = preset === 'custom' ? '' : 'none';
    const now = new Date();
    if (preset === 'month') {
        document.getElementById('reportStart').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
        document.getElementById('reportEnd').value = todayStr();
    } else if (preset === 'semester') {
        const month = now.getMonth() + 1;
        const semStart = month >= 8 ? `${now.getFullYear()}-09-01` : `${now.getFullYear()}-02-01`;
        document.getElementById('reportStart').value = semStart;
        document.getElementById('reportEnd').value = todayStr();
    }
}

function generateReport() {
    const studentId = document.getElementById('reportStudent').value;
    if (!studentId) return alert('请选择学生');
    const startDate = document.getElementById('reportStart').value;
    const endDate = document.getElementById('reportEnd').value;
    if (!startDate || !endDate) return alert('请设置日期范围');
    const student = studentById(studentId);
    if (!student) return alert('学生不存在');
    const records = getRecords()
        .filter(r => r.studentId === studentId && r.date >= startDate && r.date <= endDate)
        .sort((a, b) => a.date.localeCompare(b.date));
    if (!records.length) return alert('该时间范围内没有记录');

    chartInstances.forEach(c => c.destroy());
    chartInstances = [];

    const total = records.length;
    const presentCount = records.filter(r => r.attendance === 'present').length;
    const absentCount = records.filter(r => r.attendance === 'absent').length;
    const lateCount = records.filter(r => r.attendance === 'late').length;
    const avgMood = (records.reduce((s, r) => s + r.mood, 0) / total).toFixed(1);
    const avgMeal = (records.reduce((s, r) => s + r.meal, 0) / total).toFixed(1);
    const avgNap = (records.reduce((s, r) => s + r.napDuration, 0) / total).toFixed(0);
    const avgTemp = (records.reduce((s, r) => s + r.temperature, 0) / total).toFixed(1);

    const container = document.getElementById('reportContent');
    container.innerHTML = `
        <div class="card">
            <div class="section-title">${student.avatar} ${esc(student.name)} - ${esc(student.className)} 学期报告</div>
            <p style="color:var(--text-light);font-size:13px;margin-bottom:16px">${startDate} 至 ${endDate}，共 ${total} 天记录</p>
            <div class="stat-row">
                <div class="stat-item stat-present"><div class="stat-value">${presentCount}</div><div class="stat-label">出勤天数</div></div>
                <div class="stat-item stat-absent"><div class="stat-value">${absentCount}</div><div class="stat-label">请假天数</div></div>
                <div class="stat-item stat-late"><div class="stat-value">${lateCount}</div><div class="stat-label">迟到天数</div></div>
                <div class="stat-item"><div class="stat-value">${avgMood}</div><div class="stat-label">平均情绪</div></div>
                <div class="stat-item"><div class="stat-value">${avgMeal}</div><div class="stat-label">平均用餐</div></div>
            </div>
        </div>
        <div class="chart-grid">
            <div class="chart-card"><h3>📊 出勤情况</h3><canvas id="chartAttendance"></canvas></div>
            <div class="chart-card"><h3>😊 情绪变化趋势</h3><canvas id="chartMood"></canvas></div>
            <div class="chart-card"><h3>🍽️ 用餐情况趋势</h3><canvas id="chartMeal"></canvas></div>
            <div class="chart-card"><h3>🥧 用餐质量分布</h3><canvas id="chartMealPie"></canvas></div>
            <div class="chart-card"><h3>💤 午睡时长 (周平均)</h3><canvas id="chartNapBar"></canvas></div>
            <div class="chart-card"><h3>🌡️ 体温监测</h3><canvas id="chartTemp"></canvas></div>
            <div class="chart-card full-width"><h3>🌟 综合评估雷达图</h3><canvas id="chartRadar" style="max-height:400px"></canvas></div>
        </div>
    `;

    setTimeout(() => {
        createAttendancePie(presentCount, absentCount, lateCount);
        createMoodLine(records);
        createMealLine(records);
        createMealPie(records);
        createNapBar(records);
        createTempLine(records);
        createRadar(records, presentCount, total);
    }, 50);
}

function createAttendancePie(present, absent, late) {
    const ctx = document.getElementById('chartAttendance').getContext('2d');
    chartInstances.push(new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['出勤', '请假', '迟到'],
            datasets: [{ data: [present, absent, late], backgroundColor: ['#51CF66','#FF6B6B','#FFD43B'], borderWidth: 2, borderColor: '#fff' }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    }));
}

function createMoodLine(records) {
    const ctx = document.getElementById('chartMood').getContext('2d');
    chartInstances.push(new Chart(ctx, {
        type: 'line',
        data: {
            labels: records.map(r => r.date.slice(5)),
            datasets: [{
                label: '情绪评分',
                data: records.map(r => r.mood),
                borderColor: '#4A90D9',
                backgroundColor: 'rgba(74,144,217,0.1)',
                fill: true, tension: 0.3, pointRadius: 3
            }]
        },
        options: { responsive: true, scales: { y: { min: 0, max: 5.5, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
    }));
}

function createMealLine(records) {
    const ctx = document.getElementById('chartMeal').getContext('2d');
    chartInstances.push(new Chart(ctx, {
        type: 'line',
        data: {
            labels: records.map(r => r.date.slice(5)),
            datasets: [{
                label: '用餐评分',
                data: records.map(r => r.meal),
                borderColor: '#FF922B',
                backgroundColor: 'rgba(255,146,43,0.1)',
                fill: true, tension: 0.3, pointRadius: 3
            }]
        },
        options: { responsive: true, scales: { y: { min: 0, max: 5.5, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
    }));
}

function createMealPie(records) {
    const good = records.filter(r => r.meal >= 4).length;
    const ok = records.filter(r => r.meal === 3).length;
    const bad = records.filter(r => r.meal <= 2).length;
    const ctx = document.getElementById('chartMealPie').getContext('2d');
    chartInstances.push(new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['好 (4-5分)', '一般 (3分)', '较差 (1-2分)'],
            datasets: [{ data: [good, ok, bad], backgroundColor: ['#51CF66','#FFD43B','#FF6B6B'], borderWidth: 2, borderColor: '#fff' }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    }));
}

function createNapBar(records) {
    const weeks = {};
    records.forEach(r => {
        const d = new Date(r.date);
        const weekStart = new Date(d);
        weekStart.setDate(d.getDate() - d.getDay());
        const key = weekStart.toISOString().slice(0, 10);
        if (!weeks[key]) weeks[key] = [];
        weeks[key].push(r.napDuration);
    });
    const labels = Object.keys(weeks).sort().map(k => k.slice(5));
    const data = Object.keys(weeks).sort().map(k => {
        const arr = weeks[k];
        return Math.round(arr.reduce((a,b) => a+b, 0) / arr.length);
    });
    const ctx = document.getElementById('chartNapBar').getContext('2d');
    chartInstances.push(new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{ label: '周平均午睡(分钟)', data, backgroundColor: 'rgba(102,217,232,0.6)', borderColor: '#66D9E8', borderWidth: 1 }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
    }));
}

function createTempLine(records) {
    const ctx = document.getElementById('chartTemp').getContext('2d');
    const temps = records.map(r => r.temperature);
    const colors = temps.map(t => t > 37.3 ? '#FF6B6B' : '#51CF66');
    chartInstances.push(new Chart(ctx, {
        type: 'line',
        data: {
            labels: records.map(r => r.date.slice(5)),
            datasets: [{
                label: '体温 (°C)',
                data: temps,
                borderColor: '#E85D5D',
                backgroundColor: 'rgba(232,93,93,0.1)',
                fill: true, tension: 0.2,
                pointBackgroundColor: colors,
                pointRadius: 4
            }]
        },
        options: {
            responsive: true,
            scales: { y: { min: 35.5, max: 39 } },
            plugins: {
                legend: { display: false },
                annotation: {}
            }
        }
    }));
}

function createRadar(records, presentCount, total) {
    const avgMood = records.reduce((s,r) => s+r.mood, 0) / records.length;
    const avgMeal = records.reduce((s,r) => s+r.meal, 0) / records.length;
    const avgNapQ = records.reduce((s,r) => s+r.napQuality, 0) / records.length;
    const attScore = (presentCount / total) * 5;
    const avgTemp = records.reduce((s,r) => s+r.temperature, 0) / records.length;
    const healthScore = avgTemp <= 37.3 ? 5 : avgTemp <= 37.8 ? 3 : 1;

    const ctx = document.getElementById('chartRadar').getContext('2d');
    chartInstances.push(new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['出勤', '情绪', '用餐', '午睡质量', '健康'],
            datasets: [{
                label: '综合评估',
                data: [
                    parseFloat(attScore.toFixed(1)),
                    parseFloat(avgMood.toFixed(1)),
                    parseFloat(avgMeal.toFixed(1)),
                    parseFloat(avgNapQ.toFixed(1)),
                    healthScore
                ],
                backgroundColor: 'rgba(74,144,217,0.2)',
                borderColor: '#4A90D9',
                pointBackgroundColor: '#4A90D9',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            scales: { r: { min: 0, max: 5, ticks: { stepSize: 1 } } },
            plugins: { legend: { display: false } }
        }
    }));
}

/* ===== DATA BACKUP ===== */
function exportJSON() {
    const data = {
        students: getStudents(),
        records: getRecords(),
        exportDate: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `幼儿园数据备份_${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
}

function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = JSON.parse(ev.target.result);
            if (!data.students || !data.records) throw new Error('格式错误');
            if (!confirm(`即将导入 ${data.students.length} 名学生和 ${data.records.length} 条记录。\n当前数据将被覆盖，是否继续？`)) return;
            saveStudents(data.students);
            saveRecords(data.records);
            alert('数据恢复成功！');
            refreshClassDropdowns();
            renderStudents();
        } catch (err) {
            alert('导入失败：文件格式不正确');
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

/* ===== UTILS ===== */
function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function esc(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
}

/* ===== INIT ===== */
function init() {
    refreshClassDropdowns();
    renderStudents();
    document.getElementById('dailyDate').value = todayStr();
}
init();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('SW registered:', reg.scope);
        }).catch(err => {
            console.log('SW registration failed:', err);
        });
    });
}
